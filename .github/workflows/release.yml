name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./...

      - name: Build binaries
        run: |
          version="${GITHUB_REF#refs/tags/v}"
          for pair in darwin/arm64 linux/amd64 linux/arm64; do
            os="${pair%/*}"
            arch="${pair#*/}"
            GOOS=$os GOARCH=$arch go build -ldflags "-s -w -X main.version=${GITHUB_REF#refs/tags/}" -o cv ./cmd/cv
            tar czf "cv-${version}-${os}-${arch}.tar.gz" cv completions/
            rm cv
          done

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          version="${tag#v}"
          # Create release if it doesn't exist yet
          gh release create "$tag" --title "$tag" --generate-notes 2>/dev/null || true
          gh release upload "$tag" cv-${version}-*.tar.gz --clobber

      - name: Update Homebrew formula
        uses: Justintime50/homebrew-releaser@v3
        with:
          homebrew_owner: marcelocantos
          homebrew_tap: homebrew-tap
          github_token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          install: |-
            bin.install "cv"
            bash_completion.install "completions/cv.bash" => "cv"
            zsh_completion.install "completions/cv.zsh" => "_cv"
          test: |-
            (testpath/"cvfile").write <<~EOS
              greeting = world

              hello.txt:
                  echo $greeting > $target
            EOS
            system bin/"cv", "-n", "hello.txt"
          version: ${{ github.ref_name }}
          target_darwin_amd64: false
          target_darwin_arm64: true
          target_linux_amd64: true
          target_linux_arm64: true
          skip_checksum: true
